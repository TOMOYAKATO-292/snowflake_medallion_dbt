# =============================================================================
# dbt パッケージ定義
# =============================================================================
# dbt のパッケージ = 再利用可能なマクロやテストのライブラリ。
# pip install のように dbt deps コマンドでインストールする。
#
# 【インストール手順】
# cd dbt_project
# dbt deps
#
# 【dbt_utils とは】
# dbt 公式のユーティリティパッケージ。よく使う機能が詰まっている:
# - generate_surrogate_key: 複合キーからサロゲートキーを生成
# - star: SELECT * の代わりに全カラムを明示的に列挙
# - date_spine: 日付の連続テーブルを生成
# - その他多数のテストマクロ
# =============================================================================

packages:
  - package: dbt-labs/dbt_utils
    version: [">=1.0.0", "<2.0.0"]
